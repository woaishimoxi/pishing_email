# 面向中小型企业的轻量化钓鱼邮件检测与溯源系统
# Docker 部署配置文件

version: '3.8'

services:
  phish-detector:
    build: .
    container_name: phish-detector-system
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - VT_API_KEY=${VT_API_KEY:-}
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - phish-net

networks:
  phish-net:
    driver: bridge

volumes:
  data:
  models:
